server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coinsec_db}
    username: ${DB_USERNAME:coinsec}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false

logging:
  level:
    root: INFO
    com.kody.coinsec.backend: INFO
    org.springframework: WARN
    org.hibernate: WARN

sa-token:
  is-log: false
  timeout: ${TOKEN_TIMEOUT:2592000}
